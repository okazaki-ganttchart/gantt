<!DOCTYPE html>
<!-- gantt_excel_v7b -->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>講義動画制作 ガントチャート</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* ライトテーマ */
  --bg:      #f5f6f8;
  --surf1:   #ffffff;
  --surf2:   #f0f2f7;
  --surf3:   #e8ebf2;
  --bdr:     #dde0e8;
  --bdr2:    #c8ccd8;
  --txt:     #1a1d2e;
  --txt2:    #5a5f7a;
  --txt3:    #9a9fb8;

  /* バー色 */
  --c-rec:      #e53935;   /* 収録日: 赤 */
  --c-rec-bg:   #fff0f0;
  --c-rec-bdr:  #ffcdd2;
  --c-ifoster:  #2e7d32;
  --c-org:      #1565c0;
  --theme-main: #005BAC;
  --theme-bg:   #E8F0F8;

  /* 土日祝 */
  --sat-bg:  #f0f4ff;
  --sat-txt: #3b5bdb;
  --sun-bg:  #fff5f5;
  --sun-txt: #e03131;
  --tod-bg:  #fffde7;
  --tod-bdr: #f9a825;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif;
  background: var(--bg);
  color: var(--txt);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  font-size: 13px;
}

/* ── HEADER ─────────── */
.app-header {
  height: 58px;
  background: var(--surf1);
  border-bottom: 2px solid var(--bdr);
  display: flex;
  align-items: center;
  padding: 0;
  gap: 0;
  flex-shrink: 0;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
  overflow: hidden;
}
.header-colorbar {
  width: 16px;
  align-self: stretch;
  background: var(--theme-main);
  flex-shrink: 0;
  margin-right: 14px;
  transition: background .3s;
}
.header-subj-wrap {
  width: 340px;
  min-width: 340px;
  flex-shrink: 0;
  margin-right: 14px;
  overflow: hidden;
}
.app-title {
  font-size: 11px;
  font-weight: 500;
  color: var(--txt2);
  white-space: nowrap;
}
.legend {
  display: flex;
  gap: 18px;
  margin-left: auto;
  align-items: center;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 11px;
  color: var(--txt2);
  white-space: nowrap;
  font-weight: 500;
}
.legend-pip {
  width: 14px; height: 9px;
  border-radius: 3px;
  flex-shrink: 0;
}

/* ── TABS ────────────── */
.tabs {
  height: 42px;
  background: var(--surf1);
  border-bottom: 1px solid var(--bdr);
  display: flex;
  align-items: flex-end;
  padding: 0 20px;
  gap: 2px;
  flex-shrink: 0;
}
.tab {
  padding: 6px 12px 7px;
  font-size: 11px;
  font-weight: 600;
  color: var(--txt3);
  border-radius: 6px 6px 0 0;
  cursor: pointer;
  border: 1px solid transparent;
  border-bottom: none;
  transition: color .15s, background .15s;
  user-select: none;
  white-space: nowrap;
  max-width: 200px;
  overflow: hidden;
  text-overflow: ellipsis;
}
.tab:hover { color: var(--txt); background: var(--surf2); }
.tab.active {
  color: var(--c-ifoster);
  background: var(--bg);
  border-color: var(--bdr);
  border-bottom-color: var(--bg);
}

/* ── MAIN ────────────── */
.gantt-outer {
  flex: 1;
  overflow: hidden;
  position: relative;
}
.gantt-scroll {
  width: 100%;
  height: 100%;
  overflow: auto;
  background: var(--bg);
}

/* ── 日付ヘッダー ────── */
.gantt-head {
  position: sticky;
  top: 0;
  z-index: 40;
  background: var(--surf1);
  border-bottom: 2px solid var(--bdr2);
  box-shadow: 0 2px 6px rgba(0,0,0,.07);
}
.head-row1 {
  display: flex;
  height: 32px;
  align-items: center;
  background: var(--surf1);
}
.head-row2, .head-row3 {
  display: flex;
  height: 17px;
}

.th-lbl {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--txt3);
  padding: 0 12px;
  display: flex;
  align-items: center;
  background: var(--surf1);
  border-right: 1px solid var(--bdr);
  height: 100%;
  flex-shrink: 0;
}

.month-cell {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 17px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .06em;
  color: var(--txt2);
  background: var(--surf2);
  border-right: 2px solid var(--surf1);
  border-bottom: 1px solid var(--bdr);
  flex-shrink: 0;
  overflow: hidden;
}
.day-cell {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 17px;
  font-size: 8.5px;
  font-family: 'DM Mono', monospace;
  color: var(--txt3);
  background: var(--surf2);
  border-right: 1px solid var(--bdr);
  flex-shrink: 0;
}
.day-cell.dc-sat { color: var(--sat-txt); background: var(--sat-bg); }
.day-cell.dc-sun { color: var(--sun-txt); background: var(--sun-bg); }
.day-cell.dc-tod { color: #7b5800; background: var(--tod-bg); font-weight: 700; border-right: 1px solid var(--tod-bdr); }

/* ── ROWS ────────────── */
.gantt-body { position: relative; }

.g-row {
  display: flex;
  border-bottom: 1px solid var(--bdr);
  position: relative;
}
.g-row.phase-row {
  background: var(--surf2);
  border-bottom: 2px solid var(--bdr2);
  min-height: 40px;
}
.g-row.task-row {
  background: var(--surf1);
  min-height: 34px;
}
.g-row.task-row:hover { background: #f8f9fc; }
.g-row.rec-row { background: var(--surf1); }

/* Fixed cells */
.fc {
  flex-shrink: 0;
  position: sticky;
  z-index: 15;
  display: flex;
  align-items: center;
  border-right: 1px solid var(--bdr);
}
.fc-task  { left: 0; }
.fc-staff { border-right: 1px solid var(--bdr2); }
.fc-start { border-right: 1px solid var(--bdr); justify-content: center; font-family:'DM Mono',monospace; font-size:11px; color:var(--txt2); }
.fc-end   { border-right: 2px solid var(--bdr2); justify-content: center; font-family:'DM Mono',monospace; font-size:11px; color:var(--txt2); }

.task-row  .fc { background: var(--surf1); }
.task-row:hover .fc { background: #f8f9fc; }
.rec-row   .fc { background: var(--surf1); }

.fc-task-lbl {
  padding: 0 12px;
  font-size: 12px;
  color: var(--txt2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex-shrink: 0;  /* width:100%をflex-shrink:0に変更 */
}
.phase-row .fc-task-lbl {
  font-weight: 700;
  font-size: 13px;
  color: var(--txt);
  padding-left: 14px;
}
.task-row .fc-task-lbl { padding-left: 26px; }
.rec-row  .fc-task-lbl { color: var(--txt2); font-weight: 400; }
.slide-check-row .fc-task-lbl { color: var(--txt2); }

.fc-staff-lbl {
  padding: 0 10px;
  font-size: 10px;
  color: var(--txt2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  width: 100%;
  font-weight: 500;
}
.rec-row  .fc-staff-lbl { color: var(--txt2); }

/* ── CHART AREA ──────── */
.chart-area {
  position: relative;
  flex-shrink: 0;
}
/* グリッドは chart-area に背景として一括描画 */
.grid-layer {
  position: absolute;
  top: 0; left: 0; bottom: 0;
  pointer-events: none;
  z-index: 0;
}
.gd {
  position: absolute;
  top: 0; bottom: 0;
}
.gd.dc-sat { background: var(--sat-bg); }
.gd.dc-sun { background: var(--sun-bg); }
.gd.dc-tod { background: var(--tod-bg); border-right: 1px solid var(--tod-bdr); }

/* ── GANTT BARS ──────── */
.bar-layer {
  position: absolute;
  top: 0; left: 0; bottom: 0;
  pointer-events: none;
  z-index: 2;
}
.g-bar {
  position: absolute;
  border-radius: 5px;
  top: 50%;
  transform: translateY(-50%);
  pointer-events: all;
  cursor: grab;
  display: flex;
  align-items: center;
  padding: 0 10px;
  font-size: 10px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  user-select: none;
  transition: filter .12s, box-shadow .12s;
}
.g-bar:hover { filter: brightness(.93); z-index: 20; }
.g-bar.dragging { cursor: grabbing; z-index: 50; opacity: .88; }

/* 収録日: 赤 */
.bar-rec {
  height: 24px;
  background: var(--c-rec);
  color: #fff;
  box-shadow: 0 2px 6px rgba(229,57,53,.35);
  border-radius: 6px;
}
/* i-foster: 緑 */
.bar-ifoster {
  height: 20px;
  background: var(--c-ifoster);
  color: #fff;
  box-shadow: 0 2px 6px rgba(46,125,50,.25);
}
/* 講師/放送大学: 青 */
.bar-org {
  height: 20px;
  background: var(--c-org);
  color: #fff;
  box-shadow: 0 2px 6px rgba(21,101,192,.25);
}
/* フェーズバー: 薄いグレー */
.bar-phase {
  height: 12px;
  background: rgba(0,0,0,.08);
  border: 1px solid rgba(0,0,0,.12);
  color: var(--txt2);
  border-radius: 3px;
  font-size: 9px;
  pointer-events: none;
}

.bar-handle {
  position: absolute;
  top: 0; bottom: 0;
  width: 8px;
  cursor: ew-resize;
  z-index: 3;
  border-radius: inherit;
}
.bar-handle-l { left: 0; }
.bar-handle-r { right: 0; }

/* ── 収録日 INPUT ──────── */
.rec-input {
  background: #fff;
  border: 1.5px solid var(--c-rec);
  color: var(--c-rec);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 5px;
  outline: none;
  cursor: pointer;
  width: 118px;
}
.rec-input:focus { box-shadow: 0 0 0 3px rgba(229,57,53,.15); }

/* ── TOOLTIP ─────────── */
#tt {
  position: fixed;
  background: #fff;
  border: 1px solid var(--bdr2);
  border-radius: 10px;
  padding: 12px 16px;
  font-size: 12px;
  pointer-events: none;
  z-index: 999;
  box-shadow: 0 8px 28px rgba(0,0,0,.14);
  min-width: 210px;
  display: none;
}
#tt-name { font-weight: 700; font-size: 13px; margin-bottom: 8px; color: var(--txt); }
.tt-row  { display: flex; justify-content: space-between; gap: 20px; margin-top: 4px; color: var(--txt2); line-height: 1.7; }
.tt-val  { color: var(--txt); font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; }

/* ── FOOTER ──────────── */
.app-footer {
  height: 30px;
  background: var(--surf1);
  border-top: 1px solid var(--bdr);
  display: flex;
  align-items: center;
  padding: 0 18px;
  gap: 22px;
  font-size: 10px;
  color: var(--txt3);
  flex-shrink: 0;
}
kbd {
  background: var(--surf2);
  border: 1px solid var(--bdr2);
  border-radius: 3px;
  padding: 0 4px;
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--txt2);
}

.toggle-btn {
  width: 20px; height: 20px;
  border-radius: 4px;
  border: 1px solid var(--bdr2);
  background: var(--surf1);
  color: var(--txt2);
  font-size: 10px;
  cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background .15s;
  margin-right: 5px;
  user-select: none;
  padding: 0;
  line-height: 1;
}
.toggle-btn:hover { background: var(--bdr); color: var(--txt); }
.task-rows-wrap.collapsed { display: none; }
.bulk-btns { display:flex; gap:6px; align-items:center; margin-left:10px; margin-bottom:6px; }
.bulk-btn {
  padding: 6px 14px; font-size: 12px; font-weight: 700;
  border-radius: 6px; border: none;
  cursor: pointer; transition: filter .15s; white-space:nowrap;
  box-shadow: 0 2px 6px rgba(0,0,0,.15);
  letter-spacing: .02em;
}
.bulk-btn:hover { filter: brightness(.92); }
.bulk-btn:active { filter: brightness(.85); transform: translateY(1px); }
.bulk-btn-open {
  background: var(--c-ifoster); color: #fff;
}
.bulk-btn-active {
  background: var(--c-org); color: #fff;
}
.bulk-btn-reset {
  background: #f5f5f5; color: #999; border: 1px solid #ddd;
  box-shadow: none; font-size: 11px; padding: 4px 10px;
}
.bulk-btn-reset:hover { background: #fee; color: #c00; border-color: #fcc; }
.koma-title-input {
  border: none;
  background: transparent; color: var(--txt);
  font-size: 12px; font-family: inherit; outline: none;
  flex: 1; min-width: 60px; padding: 1px 6px;
}
.koma-title-input::placeholder { color: var(--txt3); }
.koma-title-input:focus { background: rgba(0,0,0,.03); border-radius: 3px; }
/* フェーズ行（■科目紹介など）のタイトル欄は縦線なし */
.phase-row .koma-title-input {
  border: none !important;
  border-left: none !important;
}
.tab-hide-btn:hover { color: var(--c-rec) !important; border-color: var(--c-rec) !important; }
.subj-name-input {
  border: none; border-bottom: 2px solid var(--theme-main);
  background: transparent; color: var(--theme-main);
  font-size: 15px; font-weight: 800; font-family: inherit;
  outline: none; width: 330px; padding: 1px 2px; letter-spacing: .01em;
  transition: color .3s, border-color .3s;
}
.subj-name-input::placeholder { color: var(--txt3); font-weight: 400; font-size:12px; }
.subj-name-input:focus { border-bottom-color: var(--theme-main); }
.g-row.phase-row { background: var(--theme-bg); }
.phase-row .fc { background: var(--theme-bg); }
/* meeting-row は phase-row と同じスタイルを使用 */
.meeting-date-inp {
  border: 1px solid var(--bdr2); border-radius: 4px;
  background: transparent; font-size: 11px;
  font-family: inherit; outline: none;
  color: var(--txt); padding: 2px 6px; cursor: pointer;
}
.location-inp {
  border: none; border-bottom: 1px dashed var(--bdr2);
  background: transparent; font-size: 10px;
  font-family: inherit; outline: none;
  color: var(--txt2); padding: 1px 4px; width: 100px; margin-left:4px;
}
.location-inp::placeholder { color: var(--txt3); }
::-webkit-scrollbar { width: 7px; height: 7px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--bdr2); border-radius: 4px; }
::-webkit-scrollbar-corner { background: var(--bg); }
</style>
</head>
<body>

<header class="app-header">
  <div class="header-colorbar" id="headerColorbar"></div>
  <div class="header-subj-wrap">
    <div id="subjLabel"></div>
  </div>
  <div style="display:flex;flex-direction:column;gap:1px;margin-right:14px;flex-shrink:0;">
    <div class="app-title">🎬 講義動画制作 ガントチャート</div>
    <div class="app-title">2026/4/1 – 2027/1/31</div>
  </div>
  <div class="legend" style="margin-left:0;margin-right:10px;flex-shrink:0;">
    <div class="legend-item"><div class="legend-pip" style="background:var(--c-rec)"></div>収録日</div>
    <div class="legend-item"><div class="legend-pip" style="background:var(--c-ifoster)"></div>i-foster</div>
    <div class="legend-item"><div class="legend-pip" style="background:var(--c-org)"></div>講師 / OL課</div>
  </div>
  <div style="flex:1;"></div>
  <div id="themePicker" style="display:flex;gap:5px;align-items:center;margin-right:10px;"></div>
  <div style="display:flex;align-items:center;gap:5px;margin-right:10px;flex-shrink:0;">
    <span style="font-size:10px;color:var(--txt2);white-space:nowrap;">📁</span>
    <input id="projectInput" type="text" placeholder="案件名"
      style="font-size:11px;padding:3px 7px;border:1px solid var(--bdr2);border-radius:4px;
             background:var(--surf1);color:var(--txt);outline:none;width:150px;font-family:inherit;"
      value="default" title="案件名を入力してEnterで切替">
  </div>
  <div id="connStatus" style="font-size:10px;font-weight:500;white-space:nowrap;margin-right:12px;color:#aaa;">🔴 ローカル</div>
</header>

<div style="display:flex;align-items:flex-end;background:var(--surf1);border-bottom:1px solid var(--bdr);padding:0 20px 0 20px;height:42px;">
  <div id="tabsRow" style="display:flex;align-items:flex-end;gap:2px;height:100%;flex:1;"></div>
  <div class="bulk-btns">
    <button class="bulk-btn bulk-btn-reset" onclick="clearLS()" title="全データリセット">🗑 リセット</button>
    <button class="bulk-btn bulk-btn-open" onclick="toggleAll('open')">▼ 全て開く</button>
    <button class="bulk-btn bulk-btn-active" onclick="toggleAll('active')">▶ 進行中のみ</button>
  </div>
</div>

<div class="gantt-outer">
  <div class="gantt-scroll" id="ganttScroll">
    <div id="ganttWrap" style="position:relative"></div>
  </div>
</div>
<div id="addKomaBar" style="
  padding:8px 12px;
  background:var(--surf1);
  border-top:1px dashed var(--bdr2);
  flex-shrink:0;
"></div>

<footer class="app-footer">
  <span>🔴 収録日セルに日付入力（他タスクは全てドラッグで手動設定）</span>
  <span>🖱 バードラッグ <kbd>移動</kbd>&ensp;両端ドラッグ <kbd>期間変更</kbd></span>
  <span>土曜 <span style="color:var(--sat-txt);font-weight:700">■</span>&ensp;日祝 <span style="color:var(--sun-txt);font-weight:700">■</span>&ensp;今日 <span style="color:#7b5800;font-weight:700">■</span></span>
</footer>

<div id="tt">
  <div id="tt-name"></div>
  <div class="tt-row"><span>担当</span><span class="tt-val" id="tt-staff"></span></div>
  <div class="tt-row"><span>開始</span><span class="tt-val" id="tt-s"></span></div>
  <div class="tt-row"><span>終了</span><span class="tt-val" id="tt-e"></span></div>
  <div class="tt-row"><span>期間</span><span class="tt-val" id="tt-d"></span></div>
</div>

<!-- Firebase Realtime Database (compat版) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
// ════════════════════════════════════════════════════════
// Firebase設定（自分のFirebaseプロジェクトの値に書き換える）
// ════════════════════════════════════════════════════════
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyBNddM63Jn7aJS_6RERbC0A26sFgOk-83E",
  authDomain:        "ifoster-gantt-chart.firebaseapp.com",
  databaseURL:       "https://ifoster-gantt-chart-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "ifoster-gantt-chart",
  storageBucket:     "ifoster-gantt-chart.firebasestorage.app",
  messagingSenderId: "348538378170",
  appId:             "1:348538378170:web:8356c944d3ff412aa0af83"
};

let fbDB = null;
let isRemoteUpdate = false;
let currentProject = 'default';  // 現在のプロジェクトパス（変更可能）
let fbListener = null;           // リスナー参照（切り替え時に解除用）

function initFirebase() {
  try {
    if (!FIREBASE_CONFIG.apiKey || FIREBASE_CONFIG.apiKey === 'YOUR_API_KEY') {
      updateConnUI(false, 'ローカルモード（Firebase未設定）'); return;
    }
    const app = firebase.initializeApp(FIREBASE_CONFIG);
    fbDB = firebase.database(app);
    fbDB.ref('.info/connected').on('value', snap => {
      updateConnUI(snap.val()===true, snap.val()===true ? 'リアルタイム同期中 🔄' : '再接続中...');
    });
    startListening();
  } catch(e) { console.error('Firebase初期化エラー:', e); updateConnUI(false, '接続エラー'); }
}

function getDBPath() {
  return 'projects/' + currentProject;
}

function startListening() {
  if (!fbDB) return;
  // 既存リスナーを解除
  if (fbListener) {
    fbDB.ref(getDBPath()).off('value', fbListener);
  }
  fbListener = fbDB.ref(getDBPath()).on('value', snap => {
    if (!snap.exists()) return;
    isRemoteUpdate = true;
    try { mergeRemote(snap.val()); } finally { isRemoteUpdate = false; }
  });
}

function switchProject(newName) {
  if (!newName || newName === currentProject) return;
  currentProject = newName.trim();
  // LocalStorageキーも更新
  window._lsKey = 'ifoster_gantt_' + currentProject;
  currentThemeId='blue'; applyTheme('blue',false); buildThemePicker();
  MEETING_DATES=Array(10).fill('');
  CHARTS.forEach(ch => {
    STATE[ch.id] = [
      newKoma('科目紹介'),
      newKoma('第1回'), newKoma('第2回'), newKoma('第3回'), newKoma('第4回'),
      newKoma('第5回'), newKoma('第6回'), newKoma('第7回'), newKoma('第8回'),
    ];
    SUBJ_NAMES[ch.id] = '';
    KOMA_TITLES[ch.id] = Array(ch.koma+1).fill('');
    ch.hidden = false;  // 案件切替時はタブを全部表示に戻す
  });
  // ローカルから読み込み試行
  loadFromLS();
  render(curSubjId);
  // Firebaseリスナーを新しいパスに切り替え
  startListening();
  updateConnUI(!!fbDB, fbDB ? 'プロジェクト切替完了 🔄' : 'ローカルモード');
}

function mergeRemote(data) {
  let dirty = false;
  if (data._theme && data._theme!==currentThemeId) { applyTheme(data._theme,false); buildThemePicker(); }
  if (data._meeting) MEETING_DATES=data._meeting.map(v=>v||'');
  CHARTS.forEach(ch => {
    const d = data[ch.id]; if (!d) return;
    if (d.subjName!==undefined && d.subjName!==SUBJ_NAMES[ch.id]) {
      SUBJ_NAMES[ch.id]=d.subjName||'';
      // 科目名変化もDOM直接更新（render()でフォーカスロスト防止）
      if (ch.id===curSubjId) {
        const inp = document.getElementById('subjLabel')?.querySelector('input');
        if (inp && document.activeElement !== inp) inp.value = d.subjName||'';
        // dirty=trueにしない
      }
    }
    if (d.hidden!==undefined && d.hidden!==(ch.hidden||false)) { ch.hidden=d.hidden; dirty=true; }
    if (d.hidden !== undefined && d.hidden !== (ch.hidden||false)) {
      ch.hidden = d.hidden;
      dirty = true;
    }
    if (d.komaTitles) {
      if (JSON.stringify(d.komaTitles) !== JSON.stringify(KOMA_TITLES[ch.id]||[])) {
        KOMA_TITLES[ch.id] = d.komaTitles;
        // タイトル変化はrender()せず直接DOMを更新（フォーカスロスト防止）
        if (ch.id===curSubjId) {
          d.komaTitles.forEach((title, ki) => {
            // data-type='label'のlabelInpを誤って取得しないよう除外
            const inp = document.querySelector(`.koma-title-input[data-ki="${ki}"][data-tn="${ch.id}"]:not([data-type="label"])`);
            if (inp && document.activeElement !== inp) inp.value = title || '';
          });
        }
        // dirty=trueにしない（render()させない）
      }
    }
    if (d.komas) {
      const entries = Object.entries(d.komas);
      while (STATE[ch.id].length < entries.length) STATE[ch.id].push(newKoma());
      entries.forEach(([ki,kd]) => {
        const k=+ki; if (!STATE[ch.id][k]) return;
        if (kd.label!==undefined && kd.label!==STATE[ch.id][k].label) {
          STATE[ch.id][k].label=kd.label||'';
          if (ch.id===curSubjId) {
            const labelEl = document.querySelector(`.koma-title-input[data-ki="${k}"][data-tn="${ch.id}"][data-type="label"]`);
            if (labelEl && document.activeElement !== labelEl) labelEl.value = kd.label||'';
          }
          // dirty=trueにしない（render()させない）
        }
        // taskNames同期（カスタムタスク名）
        if (kd.taskNames && JSON.stringify(kd.taskNames) !== JSON.stringify(STATE[ch.id][k].taskNames||[])) {
          STATE[ch.id][k].taskNames = kd.taskNames;
          if (ch.id===curSubjId) dirty=true;
        }
        // taskVisible同期（タスク削除/復元）
        if (kd.taskVisible && JSON.stringify(kd.taskVisible) !== JSON.stringify(STATE[ch.id][k].taskVisible||[])) {
          STATE[ch.id][k].taskVisible = kd.taskVisible;
          if (ch.id===curSubjId) dirty=true;
        }
        // locationの同期（DOM直接更新）
        if (kd.location!==undefined && kd.location!==(STATE[ch.id][k].location||'')) {
          STATE[ch.id][k].location = kd.location||'';
          if (ch.id===curSubjId) {
            const locEl = document.querySelector(`.location-inp[data-ki="${k}"][data-tn="${ch.id}"]`);
            if (locEl && document.activeElement !== locEl) locEl.value = kd.location||'';
            const tlEl = document.getElementById(`tloc-${ch.id}-${k}`);
            if (tlEl) tlEl.textContent = '収録日 ★'+(kd.location?' 📍'+kd.location:'');
            const blEl = document.getElementById(`tb-${ch.id}-${k}-6`);
            if (blEl) drawBar(blEl,k,6,ch.id,STATE[ch.id][k].tasks[6],TDEFS[6]);
          }
          // dirty=trueにしない
        }
        const newRec = kd.rec ? new Date(kd.rec) : null;
        const curRec = STATE[ch.id][k].rec;
        if ((newRec?.toISOString()||null)!==(curRec?.toISOString()||null)) {
          STATE[ch.id][k].rec=newRec;
          if (newRec) {
            // calcScheduleで一旦計算してから、Firebaseの保存値で上書き
            calcSchedule(newRec, STATE[ch.id][k].tasks, k);
          } else {
            STATE[ch.id][k].tasks=Array.from({length:NT},()=>({s:null,e:null}));
          }
          if (ch.id===curSubjId) dirty=true;
        }
        // recの有無に関わらず、Firebaseのtasks値で全タスクを上書き（ドラッグ変更を保持）
        if (kd.tasks) {
          Object.entries(kd.tasks).forEach(([ti,td]) => {
            const t=+ti; if (!STATE[ch.id][k].tasks[t]) return;
            const ns=td.s?new Date(td.s):null, ne=td.e?new Date(td.e):null;
            const cur=STATE[ch.id][k].tasks[t];
            if ((ns?.toISOString()||null)!==(cur.s?.toISOString()||null)||
                (ne?.toISOString()||null)!==(cur.e?.toISOString()||null)) {
              STATE[ch.id][k].tasks[t]={s:ns,e:ne};
              if (ch.id===curSubjId) dirty=true;
            }
          });
        }
      });
    }
  });
  if (dirty) render(curSubjId);
}

function saveToDB(path, value) {
  if (!fbDB || isRemoteUpdate) return;
  fbDB.ref(getDBPath()+'/'+path).set(value).catch(e=>console.warn('DB書き込みエラー:',e));
}

function updateConnUI(ok, msg) {
  const el=document.getElementById('connStatus');
  if (!el) return;
  el.textContent=(ok?'🟢 ':'🔴 ')+msg;
  el.style.color=ok?'var(--c-ifoster)':'#aaa';
}
</script>

<script>
// ══════════════════════════════════════════
// レイアウト定数（すべてJS管理）
// ══════════════════════════════════════════
const CW_TASK  = 300;   // タスク名列
const CW_STAFF = 140;   // 担当者列
const CW_START =  90;   // 開始日列
const CW_END   =  90;   // 終了日列
const FIXED_W  = CW_TASK + CW_STAFF + CW_START + CW_END;  // 620px

const L_STAFF = CW_TASK;
const L_START = CW_TASK + CW_STAFF;
const L_END   = CW_TASK + CW_STAFF + CW_START;

const ROW_H   = 34;   // タスク行高
const PHASE_H = 40;   // フェーズ行高
const DAY_PX  = 26;   // 1日の幅

const G_START = new Date(2026, 3, 1);    // 2026/4/1
const G_END   = new Date(2027, 0, 31);   // 2027/1/31
const TOTAL_DAYS = Math.round((G_END - G_START) / 86400000) + 1;  // 292
const CHART_W    = TOTAL_DAYS * DAY_PX;

const TODAY = (() => { const d = new Date(); d.setHours(0,0,0,0); return d; })();

// ══════════════════════════════════════════
// 日本の祝日
// ══════════════════════════════════════════
const HOL = new Set([
  '2026-01-01','2026-01-12','2026-02-11','2026-02-23','2026-03-20',
  '2026-04-29','2026-05-03','2026-05-04','2026-05-05','2026-05-06',
  '2026-07-20','2026-08-11','2026-09-21','2026-09-22','2026-09-23',
  '2026-10-12','2026-11-03','2026-11-23','2026-12-23',
  '2027-01-01','2027-01-11','2027-02-11','2027-02-23','2027-03-21',
  '2027-04-29','2027-05-03','2027-05-04','2027-05-05',
  '2027-07-19','2027-08-11','2027-09-20','2027-09-23',
  '2027-10-11','2027-11-03','2027-11-23',
]);

// ══════════════════════════════════════════
// 日付ユーティリティ
// ══════════════════════════════════════════
const zp    = n  => String(n).padStart(2,'0');
const dkey  = d  => `${d.getFullYear()}-${zp(d.getMonth()+1)}-${zp(d.getDate())}`;
const clone = d  => new Date(d);
const addD  = (d,n) => { const r=clone(d); r.setDate(r.getDate()+n); return r; };
const subM  = (d,m) => { const r=clone(d); r.setMonth(r.getMonth()-m); return r; };
const isHol = d  => HOL.has(dkey(d));
const isWD  = d  => d.getDay()!==0 && d.getDay()!==6 && !isHol(d);
const fmt   = d  => d ? `${d.getFullYear()}/${zp(d.getMonth()+1)}/${zp(d.getDate())}` : '—';
const fmtS  = d  => d ? `${d.getMonth()+1}/${d.getDate()}` : '';
const d2px  = d  => Math.round((d - G_START)/86400000) * DAY_PX;
const px2d  = px => Math.round(px / DAY_PX);
const clamp = d  => d < G_START ? clone(G_START) : d > G_END ? clone(G_END) : d;

function nextWD(d) {
  let r = addD(d,1);
  while (!isWD(r)) r = addD(r,1);
  return r;
}
function addWD(d, n) {   // 開始日 d から n 営業日後（d 含む）
  let r = clone(d), c = 0;
  while (c < n-1) { r = addD(r,1); if (isWD(r)) c++; }
  return r;
}
function prevDay(d) {  // 前日
  return addD(d,-1);
}

// ══════════════════════════════════════════
// タスク定義（14タスク）
// ══════════════════════════════════════════
// bar: 'bar-rec' | 'bar-ifoster' | 'bar-org'
const TDEFS = [
  { name:'提出物リマインド',                                            staff:'i-foster',    bar:'bar-ifoster', isRec:false, isSC:false },
  { name:'「LMSへ登録するbook教材」提出日',                             staff:'講師',        bar:'bar-org',     isRec:false, isSC:false },
  { name:'「顔出し導入部のスライド」提出日',                            staff:'講師',        bar:'bar-org',     isRec:false, isSC:false },
  { name:'「解説動画（10分）音声なし」提出日',                          staff:'講師',        bar:'bar-org',     isRec:false, isSC:false },
  { name:'提出物確認（著作権申請・レイアウト調整）',                    staff:'i-foster',    bar:'bar-ifoster', isRec:false, isSC:true  },
  { name:'収録スケジュール送付',                                        staff:'i-foster',    bar:'bar-ifoster', isRec:false, isSC:false },
  { name:'収録日（全8コマの「導入」と「解説動画のナレーション」）',     staff:'',            bar:'bar-rec',     isRec:true,  isSC:false },
  { name:'一次編集（尺出し・粗編・テロップ字幕なし）',                  staff:'i-foster',    bar:'bar-ifoster', isRec:false, isSC:false },
  { name:'一次編集 確認',                                               staff:'講師 / OL課', bar:'bar-org',     isRec:false, isSC:false },
  { name:'二次編集（テロップ字幕付加）',                                staff:'i-foster',    bar:'bar-ifoster', isRec:false, isSC:false },
  { name:'二次編集 確認',                                               staff:'講師 / OL課', bar:'bar-org',     isRec:false, isSC:false },
  { name:'三次編集（追加修正）',                                        staff:'i-foster',    bar:'bar-ifoster', isRec:false, isSC:false },
  { name:'三次編集 確認',                                               staff:'講師 / OL課', bar:'bar-org',     isRec:false, isSC:false },
  { name:'四次編集（最終修正）',                                        staff:'i-foster',    bar:'bar-ifoster', isRec:false, isSC:false },
  { name:'四次編集 確認',                                               staff:'講師 / OL課', bar:'bar-org',     isRec:false, isSC:false },
  { name:'視聴メモ・著作権リスト・映像時間表作成',                      staff:'i-foster',    bar:'bar-ifoster', isRec:false, isSC:false },
  { name:'視聴メモ・著作権リスト・映像時間表確認',                      staff:'講師 / OL課', bar:'bar-org',     isRec:false, isSC:false },
  { name:'納品',                                                        staff:'i-foster',    bar:'bar-rec',     isRec:false, isSC:false },
];
const NT = TDEFS.length;  // 18

// ══════════════════════════════════════════
// スケジュール計算
// ══════════════════════════════════════════
function calcSchedule(recDate, tasks, ki) {
  // 表計算科目専用の自動スケジュール計算
  // ki: コマインデックス（0=科目紹介, 1〜4=前半, 5〜8=後半）
  const isSecondHalf = ki >= 5;  // 第5〜8回は後半ルール

  // 固定提出日
  const submitDate = new Date(isSecondHalf ? '2026-07-31T00:00:00' : '2026-06-30T00:00:00');
  // 提出物確認期間
  const confirmStart = new Date(isSecondHalf ? '2026-07-31T00:00:00' : '2026-07-01T00:00:00');
  const confirmEnd   = new Date(isSecondHalf ? '2026-08-30T00:00:00' : '2026-07-30T00:00:00');

  // 収録スケジュール送付: 収録日の8営業日前
  const schedSend = addWD_back(recDate, 8);

  // 0: 提出物リマインド（submitDateの1ヶ月前）
  tasks[0].s = subM(submitDate, 1); tasks[0].e = clone(tasks[0].s);
  // 1: LMSbook提出日（固定）
  tasks[1].s = clone(submitDate); tasks[1].e = clone(submitDate);
  // 2: 顔出しスライド提出日（固定）
  tasks[2].s = clone(submitDate); tasks[2].e = clone(submitDate);
  // 3: 解説動画提出日（固定）
  tasks[3].s = clone(submitDate); tasks[3].e = clone(submitDate);
  // 4: 提出物確認（固定期間）
  tasks[4].s = clone(confirmStart); tasks[4].e = clone(confirmEnd);
  // 5: 収録スケジュール送付
  tasks[5].s = clone(schedSend); tasks[5].e = clone(schedSend);
  // 6: 収録日
  tasks[6].s = clone(recDate);
  if (!tasks[6].e || tasks[6].e.getTime() < tasks[6].s.getTime()) tasks[6].e = clone(recDate);
  // 7以降: 収録日の翌営業日から自動計算
  const WD = [8, 8, 6, 6, 5, 5, 3, 3, 10, 10, 1];  // 各タスクの営業日数
  tasks[7].s = nextWD(tasks[6].e); tasks[7].e = addWD(tasks[7].s, WD[0]);
  for (let i = 8; i <= 16; i++) {
    tasks[i].s = nextWD(tasks[i-1].e);
    tasks[i].e = addWD(tasks[i].s, WD[i-7]);
  }
  tasks[17].s = nextWD(tasks[16].e); tasks[17].e = clone(tasks[17].s);
}

// 収録日のN営業日前を計算
function addWD_back(d, n) {
  let r = clone(d);
  let count = 0;
  while (count < n) {
    r = addD(r, -1);
    if (isWD(r)) count++;
  }
  return r;
}

// ══════════════════════════════════════════
// 状態
// ══════════════════════════════════════════
function newKoma(label='') {
  return {
    rec: null, location: '', label: label,
    tasks: Array.from({length: NT}, () => ({s:null, e:null})),
    taskNames: Array.from({length: NT}, (_,i) => TDEFS[i]?.name || ''),
    taskVisible: Array.from({length: NT}, () => true),  // 各タスクの表示フラグ
  };
}
// テーマカラー
const THEME_COLORS = [
  // ユニバーサルデザイン7色（色相を均等分散・色覚多様性に配慮）
  { id:'blue',    main:'#005BAC', bg:'#E8F0F8', label:'青' },       // 色相208°
  { id:'red',     main:'#CC0000', bg:'#F8E8E8', label:'赤' },       // 色相  0°
  { id:'green',   main:'#007B43', bg:'#E8F4ED', label:'緑' },       // 色相153°
  { id:'orange',  main:'#F39800', bg:'#FDF4E3', label:'橙' },       // 色相 38°
  { id:'purple',  main:'#7B00D4', bg:'#F2E8FC', label:'紫' },       // 色相275°
  { id:'cyan',    main:'#009899', bg:'#E3F7F7', label:'青緑' },     // 色相180°
  { id:'lime',    main:'#6A8C00', bg:'#F0F5E0', label:'黄緑' },     // 色相 75°
];
let currentThemeId = 'default';

function applyTheme(themeId, save=true) {
  const theme = THEME_COLORS.find(t=>t.id===themeId) || THEME_COLORS[0];
  currentThemeId = theme.id;
  document.documentElement.style.setProperty('--theme-main', theme.main);
  document.documentElement.style.setProperty('--theme-bg',   theme.bg);
  const bar = document.getElementById('headerColorbar');
  if (bar) bar.style.background = theme.main;
  document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.style.outline = btn.dataset.tid===theme.id ? '3px solid '+theme.main : 'none';
  });
  if (save) { saveToLS(); saveToDB('_theme', theme.id); }
}

function buildThemePicker() {
  const el = document.getElementById('themePicker');
  if (!el) return;
  el.innerHTML = '';
  THEME_COLORS.forEach(theme => {
    const btn = document.createElement('div');
    btn.className='theme-btn'; btn.dataset.tid=theme.id; btn.title=theme.label;
    btn.style.cssText = 'width:16px;height:16px;border-radius:50%;cursor:pointer;' +
      'background:'+theme.main+';flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.25);' +
      'outline:'+(theme.id===currentThemeId?'3px solid '+theme.main:'none')+';outline-offset:2px;';
    btn.addEventListener('click', ()=>applyTheme(theme.id));
    el.appendChild(btn);
  });
}

// 科目定義
const CHARTS = [
  { id:'c1', koma:999, defaultName:'講義コマ' },
];
const STATE = {};
CHARTS.forEach(c => {
  STATE[c.id] = [
    newKoma('科目紹介'),
    newKoma('第1回'), newKoma('第2回'), newKoma('第3回'), newKoma('第4回'),
    newKoma('第5回'), newKoma('第6回'), newKoma('第7回'), newKoma('第8回'),
  ];
});
const SUBJ_NAMES  = { c1:'' };
const KOMA_TITLES = {};
CHARTS.forEach(ch => { KOMA_TITLES[ch.id] = Array(9).fill(''); }); // 9コマ分
let curSubjId = 'c1';
function curSubj() { return CHARTS.find(c => c.id === curSubjId); }
let MEETING_DATES = Array(10).fill('');
const MEETING_MONTHS = ['2026/4','2026/5','2026/6','2026/7','2026/8','2026/9','2026/10','2026/11','2026/12','2027/1'];
const MEETING_MIN = ['2026-04-01','2026-05-01','2026-06-01','2026-07-01','2026-08-01','2026-09-01','2026-10-01','2026-11-01','2026-12-01','2027-01-01'];
const MEETING_MAX = ['2026-04-30','2026-05-31','2026-06-30','2026-07-31','2026-08-31','2026-09-30','2026-10-31','2026-11-30','2026-12-31','2027-01-31'];

// ══════════════════════════════════════════
// LocalStorage 保存・読込
// ══════════════════════════════════════════
const LS_KEY = 'ifoster_gantt_v1';  // デフォルト（プロジェクト切替時はwindow._lsKeyを使用）
window._lsKey = LS_KEY;

function saveToLS() {
  try {
    const data = { _theme: currentThemeId, _meeting: MEETING_DATES.slice() };
    CHARTS.forEach(ch => {
      data[ch.id] = {
        subjName:   SUBJ_NAMES[ch.id],
        hidden:     ch.hidden || false,
        komaTitles: (KOMA_TITLES[ch.id]||[]).map(t=>t||''),
        komaCount: STATE[ch.id].length,
        komas: STATE[ch.id].map(koma => ({
          rec:       koma.rec ? koma.rec.toISOString() : null,
          location:  koma.location||'',
          label:     koma.label||'',
          taskNames:   koma.taskNames||[],
          taskVisible: koma.taskVisible||Array.from({length:NT},()=>true),
          tasks: koma.tasks.map(t => ({
            s: t.s ? t.s.toISOString() : null,
            e: t.e ? t.e.toISOString() : null,
          }))
        }))
      };
    });
    localStorage.setItem(window._lsKey||LS_KEY, JSON.stringify(data));
    if (!isRemoteUpdate) {
      CHARTS.forEach(ch => { saveToDB(ch.id, data[ch.id]); });
      saveToDB('_meeting', MEETING_DATES);
      saveToDB('_theme', currentThemeId);
    }
  } catch(err) { console.warn('保存失敗:', err); }
}

function loadFromLS() {
  try {
    const raw = localStorage.getItem(window._lsKey||LS_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    CHARTS.forEach(ch => {
      const d = data[ch.id];
      if (!d) return;
      if (d.subjName)   SUBJ_NAMES[ch.id]  = d.subjName;
      if (d.komaTitles) KOMA_TITLES[ch.id] = d.komaTitles;
      if (d.hidden!==undefined) ch.hidden=d.hidden;
      if (d.hidden !== undefined) ch.hidden = d.hidden;
      if (d.komas) {
        while (STATE[ch.id].length < d.komas.length) STATE[ch.id].push(newKoma());
        d.komas.forEach((komaData, ki) => {
          if (!STATE[ch.id][ki]) return;
          if (komaData.label)     STATE[ch.id][ki].label=komaData.label;
          if (komaData.rec)       STATE[ch.id][ki].rec=new Date(komaData.rec);
          if (komaData.location)  STATE[ch.id][ki].location=komaData.location;
          if (komaData.taskNames)   STATE[ch.id][ki].taskNames=komaData.taskNames;
          if (komaData.taskVisible) STATE[ch.id][ki].taskVisible=komaData.taskVisible;
          komaData.tasks.forEach((td, ti) => {
            if (!STATE[ch.id][ki].tasks[ti]) return;
            STATE[ch.id][ki].tasks[ti].s = td.s ? new Date(td.s) : null;
            STATE[ch.id][ki].tasks[ti].e = td.e ? new Date(td.e) : null;
          });
        });
      }
    });
    if (data&&data._theme)   currentThemeId=data._theme;
    if (data&&data._meeting) MEETING_DATES=data._meeting.map(v=>v||'');
  } catch(err) { console.warn('読込失敗:', err); }
}

// 月グループ・日属性キャッシュ
// ══════════════════════════════════════════
function buildMonths() {
  const out = [];
  let c = new Date(G_START.getFullYear(), G_START.getMonth(), 1);
  while (c <= G_END) {
    const y=c.getFullYear(), m=c.getMonth();
    const ms = new Date(Math.max(c.getTime(), G_START.getTime()));
    const me = new Date(Math.min(new Date(y,m+1,0).getTime(), G_END.getTime()));
    const off  = Math.round((ms-G_START)/86400000);
    const days = Math.round((me-ms)/86400000)+1;
    out.push({label:`${y}/${zp(m+1)}`, off, days});
    c = new Date(y,m+1,1);
  }
  return out;
}
const MONTHS = buildMonths();

// 日属性（'dc-sat'|'dc-sun'|'dc-tod'|''）
const DAY_CLS = Array.from({length:TOTAL_DAYS},(_,i)=>{
  const d = addD(G_START,i);
  if (d.getTime()===TODAY.getTime()) return 'dc-tod';
  const w = d.getDay();
  if (w===6) return 'dc-sat';
  if (w===0 || isHol(d)) return 'dc-sun';
  return '';
});

function el(tag, css, cls) {
  const d = document.createElement(tag||'div');
  if (css) d.style.cssText = css;
  if (cls) d.className = cls;
  return d;
}

function stickyFC(w, left, bg) {
  const d = el('div', `width:${w}px;flex-shrink:0;position:sticky;left:${left}px;z-index:15;background:${bg};`);
  return d;
}

function makeChartArea(h, rowBg, noGrid=false) {
  const ca = el('div', `width:${CHART_W}px;flex-shrink:0;height:${h}px;position:relative;background:${rowBg};overflow:visible;`);

  // グリッドレイヤー（収録日行はnoGrid=trueで土日祝色を非表示）
  const gl = el('div','position:absolute;top:0;left:0;bottom:0;pointer-events:none;z-index:0;');
  if (!noGrid) {
    for (let i=0; i<TOTAL_DAYS; i++) {
      if (!DAY_CLS[i]) continue;
      const g = el('div',`position:absolute;top:0;bottom:0;left:${i*DAY_PX}px;width:${DAY_PX}px;`,'gd '+DAY_CLS[i]);
      gl.appendChild(g);
    }
  }
  ca.appendChild(gl);

  // バーレイヤー
  const bl = el('div','position:absolute;top:0;left:0;bottom:0;pointer-events:none;z-index:2;width:100%;');
  bl.classList.add('bar-layer');
  ca.appendChild(bl);

  return { ca, bl };
}

function drawBar(bl, ki, ti, tn, task, def) {
  // 既存削除
  bl.querySelectorAll('.g-bar').forEach(b=>b.remove());
  if (!task.s || !task.e) return;

  const x = d2px(task.s);
  const w = Math.max(DAY_PX, d2px(task.e) - x + DAY_PX);
  const bar = el('div','','g-bar '+def.bar);
  bar.style.left  = x+'px';
  bar.style.width = w+'px';
  bar.dataset.ki=ki; bar.dataset.ti=ti; bar.dataset.tn=tn;

  const hl = el('div','','bar-handle bar-handle-l'); bar.appendChild(hl);
  if (w > 48) {
    const lbl = el('div','overflow:hidden;text-overflow:ellipsis;flex:1;padding:0 2px;pointer-events:none;');
    const loc = def.isRec ? (STATE[tn][ki].location||'') : '';
    const customName = STATE[tn]?.[ki]?.taskNames?.[ti] || def.name;
    lbl.textContent = loc ? '収録日 📍'+loc : customName;
    bar.appendChild(lbl);
  }
  const hr = el('div','','bar-handle bar-handle-r'); bar.appendChild(hr);
  bl.appendChild(bar);
}

function drawPhaseBar(bl, koma) {
  bl.querySelectorAll('.g-bar').forEach(b=>b.remove());
  const ss = koma.tasks.map(t=>t.s).filter(Boolean);
  const es = koma.tasks.map(t=>t.e).filter(Boolean);
  if (!ss.length) return;
  const pS = ss.reduce((a,b)=>a<b?a:b);
  const pE = es.reduce((a,b)=>a>b?a:b);
  const x  = d2px(pS);
  const w  = Math.max(DAY_PX, d2px(pE)-x+DAY_PX);
  const bar = el('div','','g-bar bar-phase');
  bar.style.left=x+'px'; bar.style.width=w+'px';
  bl.appendChild(bar);
}

    locInp.addEventListener('input', e=>{
      STATE[tn][ki].location=e.target.value;
      const tlEl=document.getElementById(`tloc-${tn}-${ki}`);
      if(tlEl) tlEl.textContent='収録日 ★'+(e.target.value?' 📍'+e.target.value:'');
      const blEl=document.getElementById(`tb-${tn}-${ki}-6`);
      if(blEl) drawBar(blEl,ki,6,tn,STATE[tn][ki].tasks[6],TDEFS[6]);
      saveToLS();
      saveToDB(tn+'/komas/'+ki+'/location', e.target.value);
    });
    fs.appendChild(locInp);
  }
  row.appendChild(fs);

  // 開始
  const fsd = stickyFC(CW_START, L_START, bg);
  fsd.className += ' fc fc-start'; fsd.style.minHeight=ROW_H+'px';
  fsd.id = `ts-${tn}-${ki}-${ti}`;
  if (def.isRec) {
    // 収録日 → input
    const inp = document.createElement('input');
    inp.type='date'; inp.className='rec-input';
    inp.min='2026-04-01'; inp.max='2027-01-31';
    inp.dataset.ki=ki; inp.dataset.tn=tn;
    if (koma.rec) inp.value=dkey(koma.rec);
    inp.addEventListener('change', onRecChange);
    fsd.style.justifyContent='center'; fsd.style.padding='0 4px';
    fsd.appendChild(inp);
  } else {
    fsd.textContent = fmtS(task.s);
  }
  row.appendChild(fsd);

  // 終了
  const fed = stickyFC(CW_END, L_END, bg);
  fed.className += ' fc fc-end'; fed.style.minHeight=ROW_H+'px';
  fed.id = `te-${tn}-${ki}-${ti}`;
  if (!def.isRec) fed.textContent = fmtS(task.e);
  row.appendChild(fed);

  // チャート（収録日行はグリッド色なし）
  const {ca, bl} = makeChartArea(ROW_H, 'var(--surf1)');
  ca.id = `tc-${tn}-${ki}-${ti}`;
  bl.id = `tb-${tn}-${ki}-${ti}`;
  row.appendChild(ca);
  drawBar(bl, ki, ti, tn, task, def);
  return row;
}

// 日付セル更新
// ══════════════════════════════════════════
function updateTaskDates(ki, ti, tn) {
  const t   = STATE[tn][ki].tasks[ti];
  const def = TDEFS[ti];
  if (def.isRec) return;
  const sd = document.getElementById(`ts-${tn}-${ki}-${ti}`);
  const ed = document.getElementById(`te-${tn}-${ki}-${ti}`);
  if (sd) sd.textContent = fmtS(t.s);
  if (ed) ed.textContent = fmtS(t.e);
}

function updatePhaseDates(ki, tn) {
  const koma = STATE[tn][ki];
  const ss = koma.tasks.map(t=>t.s).filter(Boolean);
  const es = koma.tasks.map(t=>t.e).filter(Boolean);
  const sd = document.getElementById(`ps-${tn}-${ki}`);
  const ed = document.getElementById(`pe-${tn}-${ki}`);
  if (sd) sd.textContent = ss.length ? fmtS(ss.reduce((a,b)=>a<b?a:b)) : '';
  if (ed) ed.textContent = es.length ? fmtS(es.reduce((a,b)=>a>b?a:b)) : '';
}

function updateAllBars(ki, tn) {
  const koma = STATE[tn][ki];
  for (let ti=0; ti<NT; ti++) {
    const bl = document.getElementById(`tb-${tn}-${ki}-${ti}`);
    if (bl) drawBar(bl, ki, ti, tn, koma.tasks[ti], TDEFS[ti]);
    updateTaskDates(ki, ti, tn);
  }
  const pb = document.getElementById(`pb-${tn}-${ki}`);
  if (pb) drawPhaseBar(pb, koma);
  updatePhaseDates(ki, tn);
}

function onRecChange(e) {
  const ki=+e.target.dataset.ki, tn=e.target.dataset.tn;
  const val=e.target.value;
  if (!val) return;
  const rec = new Date(val+'T00:00:00');
  STATE[tn][ki].rec = rec;
  STATE[tn][ki].tasks[6].e = new Date(rec.getTime()); // 収録日終了日を開始日にリセット
  calcSchedule(rec, STATE[tn][ki].tasks, ki);
  updateAllBars(ki, tn);
  // 収録日の終了セル
  const te = document.getElementById(`te-${tn}-${ki}-6`);
  if (te) te.textContent = fmtS(rec);
  // 収録日付近へスクロール
  const scroll = document.getElementById('ganttScroll');
  scroll.scrollLeft = Math.max(0, FIXED_W + d2px(rec) - scroll.clientWidth*0.4);
  saveToLS();  // 自動保存
}

// ドラッグ
// ══════════════════════════════════════════
const tt = document.getElementById('tt');
let drag = null;

document.addEventListener('mousemove', e => {
  if (drag) { doDragMove(e); return; }
  const bar = e.target.closest('.g-bar[data-ti]');
  if (bar) showTT(bar, e.clientX, e.clientY);
  else tt.style.display='none';
});

document.addEventListener('mousedown', e => {
  const hl  = e.target.closest('.bar-handle');
  const bar = hl ? hl.closest('.g-bar') : e.target.closest('.g-bar[data-ti]');
  if (!bar || bar.dataset.ti===undefined) return;
  e.preventDefault();
  tt.style.display='none';
  const ki=+bar.dataset.ki, ti=+bar.dataset.ti, tn=bar.dataset.tn;
  const task = STATE[tn][ki].tasks[ti];
  const mode = hl ? (hl.classList.contains('bar-handle-l')?'L':'R') : 'M';
  bar.classList.add('dragging');
  drag = { bar, ki, ti, tn, mode, os:clone(task.s), oe:clone(task.e), sx:e.clientX };
});

function doDragMove(e) {
  const {bar,ki,ti,tn,mode,os,oe,sx} = drag;
  const dd = px2d(e.clientX - sx);
  let ns=clone(os), ne=clone(oe);

  if (mode==='M') {
    ns=addD(os,dd); ne=addD(oe,dd);
    if (ns<G_START){const d=Math.round((G_START-ns)/86400000);ns=addD(ns,d);ne=addD(ne,d);}
    if (ne>G_END)  {const d=Math.round((ne-G_END)/86400000);  ns=addD(ns,-d);ne=addD(ne,-d);}
  } else if (mode==='L') {
    ns=clamp(addD(os,dd));
    if (ns>=ne) ns=addD(ne,-1);
  } else {
    ne=clamp(addD(oe,dd));
    if (ne<=ns) ne=addD(ns,1);
  }

  STATE[tn][ki].tasks[ti].s=ns;
  STATE[tn][ki].tasks[ti].e=ne;

  const x=d2px(ns), w=Math.max(DAY_PX, d2px(ne)-x+DAY_PX);
  bar.style.left=x+'px'; bar.style.width=w+'px';

  const def=TDEFS[ti];
  if (!def.isRec) {
    const sd=document.getElementById(`ts-${tn}-${ki}-${ti}`);
    const ed=document.getElementById(`te-${tn}-${ki}-${ti}`);
    if(sd)sd.textContent=fmtS(ns);
    if(ed)ed.textContent=fmtS(ne);
  }
  // 収録日(ti=4)をドラッグしたら後続タスクを再計算（isRec条件の外に置く）
  if(ti===6 && STATE[tn][ki].rec){
    calcSchedule(STATE[tn][ki].rec, STATE[tn][ki].tasks, ki);
    updateAllBars(ki, tn);
  }
  const pb=document.getElementById(`pb-${tn}-${ki}`);
  if(pb) drawPhaseBar(pb, STATE[tn][ki]);
  updatePhaseDates(ki,tn);
}

document.addEventListener('mouseup', ()=>{
  if (!drag) return;
  drag.bar.classList.remove('dragging');
  drag=null;
  saveToLS();  // 自動保存
});

function showTT(bar, x, y) {
  const ki=+bar.dataset.ki, ti=+bar.dataset.ti, tn=bar.dataset.tn;
  const t=STATE[tn][ki].tasks[ti], def=TDEFS[ti];
  const ttName = STATE[tn]?.[ki]?.taskNames?.[ti] || def.name;
  document.getElementById('tt-name').textContent  = ttName;
  document.getElementById('tt-staff').textContent = def.staff||'—';
  document.getElementById('tt-s').textContent     = fmt(t.s);
  document.getElementById('tt-e').textContent     = fmt(t.e);
  document.getElementById('tt-d').textContent     = t.s&&t.e
    ? `${Math.round((t.e-t.s)/86400000)+1}日間`:'—';
  tt.style.display='block';
  tt.style.left=Math.min(x+14,window.innerWidth-230)+'px';
  tt.style.top=(y-10)+'px';
}

function buildTabs() {
  const row = document.getElementById('tabsRow');
  row.innerHTML = '';
  const visibleCharts = CHARTS.filter(c => !c.hidden);

  visibleCharts.forEach(chart => {
    const wrap = el('div','display:flex;align-items:flex-end;gap:0;');

    // タブ本体
    const t = document.createElement('div');
    t.className = 'tab' + (chart.id===curSubjId?' active':'');
    t.textContent = chart.defaultName;
    t.addEventListener('click', ()=>{
      document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
      t.classList.add('active');
      render(chart.id);
    });
    wrap.appendChild(t);

    // 削除ボタン：現在表示中タブ・最後の1タブは非表示
    if (visibleCharts.length > 1 && chart.id !== curSubjId) {
      const db = el('div',
        'font-size:10px;cursor:pointer;padding:2px 5px;margin-bottom:7px;margin-left:1px;'+
        'color:var(--txt3);border:1px solid var(--bdr);border-radius:3px;'+
        'background:var(--surf1);line-height:1.4;flex-shrink:0;','tab-hide-btn');
      db.textContent = '×';
      db.title = 'このタブを削除（復元不可）';
      db.addEventListener('click', e => { e.stopPropagation(); deleteTab(chart.id); });
      wrap.appendChild(db);
    }
    row.appendChild(wrap);
  });
}

function deleteTab(chartId) {
  const chart = CHARTS.find(c=>c.id===chartId);
  if (!chart) return;
  // 現在表示中は削除不可
  if (chartId === curSubjId) {
    alert('現在表示中のタブは削除できません。\n先に別のタブに切り替えてください。');
    return;
  }
  // 2段階確認
  const step1 = confirm(
    `「${chart.defaultName}」タブを削除しますか？\n\n` +
    `⚠️ この操作は元に戻せません。`
  );
  if (!step1) return;
  const step2 = confirm(
    `本当に削除してよいですか？\n\n` +
    `「${chart.defaultName}」のデータが完全に削除されます。`
  );
  if (!step2) return;

  // hiddenフラグをtrueにして保存（完全削除の代わりに非表示として保存）
  const chart2 = CHARTS.find(c=>c.id===chartId);
  if (chart2) chart2.hidden = true;
  saveToLS();
  saveToDB(chartId + '/hidden', true);
  // 現在表示中なら別タブに切替
  if (curSubjId===chartId) {
    const v = CHARTS.find(c=>!c.hidden);
    if (v) render(v.id);
  }
  buildTabs();
}



// ── ソート機能 ──────────────────────────────────
function sortByRecDate() {
  const sid = curSubjId;
  const head = STATE[sid][0];
  const rest = STATE[sid].slice(1);
  const headT = (KOMA_TITLES[sid]||[])[0]||'';
  const restT = rest.map((_,i)=>(KOMA_TITLES[sid]||[])[i+1]||'');
  const paired = rest.map((k,i)=>({k,t:restT[i]}));
  paired.sort((a,b)=>{
    const ra = a.k.rec ? a.k.rec.getTime() : Infinity;
    const rb = b.k.rec ? b.k.rec.getTime() : Infinity;
    return ra-rb;
  });
  STATE[sid] = [head, ...paired.map(p=>p.k)];
  KOMA_TITLES[sid] = [headT, ...paired.map(p=>p.t)];
  saveToLS(); render(sid);
}

function sortByKomaOrder() {
  const sid = curSubjId;
  const head = STATE[sid][0];
  const rest = STATE[sid].slice(1);
  const headT = (KOMA_TITLES[sid]||[])[0]||'';
  const restT = rest.map((_,i)=>(KOMA_TITLES[sid]||[])[i+1]||'');
  const paired = rest.map((k,i)=>({k,t:restT[i]}));
  paired.sort((a,b)=>{
    const ma = (a.k.label||'').match(/([0-9]+)/);
    const mb = (b.k.label||'').match(/([0-9]+)/);
    const na = ma ? parseInt(ma[1]) : 9999;
    const nb = mb ? parseInt(mb[1]) : 9999;
    return na-nb;
  });
  STATE[sid] = [head, ...paired.map(p=>p.k)];
  KOMA_TITLES[sid] = [headT, ...paired.map(p=>p.t)];
  saveToLS(); render(sid);
}

function toggleAll(mode) {
  // mode: 'open' = 全て開く / 'close' = 全て閉じる / 'active' = 進行中のみ
  const subj = CHARTS.find(c => c.id === curSubjId);
  if (!subj) return;
  const todayMs = TODAY.getTime();

  for (let ki = 0; ki < subj.koma + 1; ki++) {
    const wrap = document.getElementById(`trw-${curSubjId}-${ki}`);
    const btn  = document.querySelector(`.toggle-btn[data-ki="${ki}"][data-tn="${curSubjId}"]`);
    if (!wrap) continue;

    if (mode === 'open') {
      // 全て開く: 全タスク行を表示してラッパーを開く
      wrap.querySelectorAll('.task-row').forEach(r => r.style.display = '');
      wrap.classList.remove('collapsed');
      if (btn) btn.textContent = '▼';

    } else if (mode === 'close') {
      // 全て閉じる: 全タスク行を表示状態に戻してラッパーを閉じる
      wrap.querySelectorAll('.task-row').forEach(r => r.style.display = '');
      wrap.classList.add('collapsed');
      if (btn) btn.textContent = '▶';

    } else if (mode === 'active') {
      // 進行中のみ:
      //   1. 今日がバー期間内のタスク → そのタスク1件を表示
      //   2. なければ開始日が今日以降で最も近いタスク1件を表示
      //   3. どちらもなければ全て非表示（フェーズ行のみ）
      const koma = STATE[curSubjId][ki];
      const rows = Array.from(wrap.querySelectorAll('.task-row'));

      // まず全行を非表示に
      rows.forEach(r => r.style.display = 'none');

      // ステップ1: 今日が期間内のタスクを探す
      let showIdx = -1;
      for (let ti = 0; ti < koma.tasks.length; ti++) {
        const t = koma.tasks[ti];
        if (t && t.s && t.e
            && t.s.getTime() <= todayMs
            && t.e.getTime() >= todayMs) {
          showIdx = ti;
          break;
        }
      }

      // ステップ2: なければ開始日が今日以降で最も近いタスク
      if (showIdx === -1) {
        let earliest = null;
        for (let ti = 0; ti < koma.tasks.length; ti++) {
          const t = koma.tasks[ti];
          if (t && t.s && t.s.getTime() > todayMs) {
            if (earliest === null || t.s.getTime() < koma.tasks[earliest].s.getTime()) {
              earliest = ti;
            }
          }
        }
        showIdx = earliest;
      }

      // 該当タスクだけ表示
      if (showIdx !== null && showIdx >= 0 && rows[showIdx]) {
        rows[showIdx].style.display = '';
        wrap.classList.remove('collapsed');
        if (btn) btn.textContent = '▼';
      } else {
        wrap.classList.add('collapsed');
        if (btn) btn.textContent = '▶';
      }
    }
  }
}
</script>
</body>
</html>
